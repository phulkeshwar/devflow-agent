<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00" />
      <stop offset="100%" stop-color="#ff6b00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded container matching GitHub Dark card background -->
  <rect width="32" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <!-- Glowing lightning bolt -->
  <path d="M18 5 L10 17 H16 L14 27 L22 15 H16 Z" fill="url(#orange-grad)" filter="url(#glow)" />
</svg>